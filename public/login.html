<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>ABS90 로그인</title>
  <style>
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top,#173054 0,#07111f 50%,#030712 100%);color:#e5eefc;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif}
    main{width:min(100%,390px);padding:28px;border:1px solid #243650;border-radius:24px;background:rgba(9,20,38,.92);box-shadow:0 24px 80px #0008}
    .mark{width:56px;height:56px;display:grid;place-items:center;border-radius:18px;background:#2563eb;font-size:28px;box-shadow:0 10px 30px #2563eb55}
    h1{margin:18px 0 6px;font-size:26px} p{margin:0 0 24px;color:#91a4c2;font-size:14px;line-height:1.55}
    label{display:block;margin:14px 0 7px;color:#b8c7dd;font-size:13px;font-weight:700}
    input{width:100%;height:50px;border:1px solid #314662;border-radius:13px;background:#0b1729;color:#fff;padding:0 14px;font-size:16px;outline:none} input:focus{border-color:#60a5fa;box-shadow:0 0 0 3px #2563eb33}
    button{width:100%;height:52px;margin-top:22px;border:0;border-radius:14px;background:#3b82f6;color:#fff;font-size:16px;font-weight:800;cursor:pointer} button:disabled{opacity:.55;cursor:wait}
    #status{min-height:22px;margin-top:14px;color:#fca5a5;text-align:center;font-size:13px}.hint{margin-top:20px;padding-top:18px;border-top:1px solid #20314a;color:#7185a4;text-align:center;font-size:12px}
  </style>
</head>
<body>
  <main>
    <div class="mark">🎯</div>
    <h1>ABS90 로그인</h1>
    <p>한 번 로그인하면 이 기기에서는 30일 동안 유지됩니다.</p>
    <form id="loginForm">
      <label for="username">아이디</label>
      <input id="username" name="username" autocomplete="username" autocapitalize="none" required>
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" inputmode="numeric" autocomplete="current-password" required>
      <button id="submitButton" type="submit">로그인</button>
      <div id="status" role="alert"></div>
    </form>
    <div class="hint">fit.get1004.com · 기기 간 자동 동기화</div>
  </main>
  <script>
    loginForm.addEventListener('submit',async event=>{
      event.preventDefault(); status.textContent=''; submitButton.disabled=true;
      try{
        const response=await fetch('/api/auth/login',{method:'POST',credentials:'same-origin',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});
        const data=await response.json();
        if(!response.ok)throw new Error(data.error||'로그인에 실패했습니다.');
        location.replace('/');
      }catch(error){ status.textContent=error.message||'로그인에 실패했습니다.'; submitButton.disabled=false; }
    });
  </script>
</body>
</html>
